<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搞笑生成器</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f3f3f3; }
        .joke { font-size: 1.5em; margin: 20px; }
        button { padding: 10px 20px; font-size: 1em; }
    </style>
</head>
<body>
    <h1>搞笑迷你生成器</h1>
    <div id="joke" class="joke">点击下面的按钮来获取笑话！</div>
    <button id="jokeButton">获取笑话</button>

    <script>
        const jokeButton = document.getElementById('jokeButton');
        const jokeDiv = document.getElementById('joke');

        jokeButton.addEventListener('click', async () => {
            const response = await fetch('https://v2.jokeapi.dev/joke/Any?lang=zh');
            const jokeData = await response.json();

            if (jokeData.type === 'single') {
                jokeDiv.innerText = jokeData.joke;
            } else {
                jokeDiv.innerText = `${jokeData.setup}\n${jokeData.delivery}`;
            }
        });
    </script>
</body>
</html>
